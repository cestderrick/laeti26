<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Une surprise pour toi ☀️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>☀️</h1>
      <h2>Une petite surprise…</h2>
      <p>Entre le mot magique pour commencer ✨</p>

      <input type="password" id="password" placeholder="Mot de passe">
      
      <button class="primary" onclick="checkPassword()">Valider</button>
      <button class="secondary" onclick="showHint()">Indice</button>

      <p id="hint" class="hint"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
